name: Finalize homepage cleanup

on:
  push:
    branches:
      - cleanup-remove-demo-and-dead-links

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup-remove-demo-and-dead-links
          fetch-depth: 0
      - name: Apply neutral provider copy
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/home/HomeSupportHub.tsx')
          text = path.read_text()
          text = text.replace(
              'Every listing is real, reviewed, and chosen because parents told us it actually helped —\n                 across the greater Houston area.',
              'Browse local providers and support resources in the greater Houston area.',
              1,
          )
          path.write_text(text)
          PY
      - name: Remove temporary workflows and commit
        run: |
          rm -f .github/workflows/finalize-home-cleanup.yml .github/workflows/one-time-neutral-copy.yml
          git config user.name "ChatGPT cleanup"
          git config user.email "actions@users.noreply.github.com"
          git add src/components/home/HomeSupportHub.tsx .github/workflows/
          git commit -m "Finalize neutral homepage provider copy"
          git push origin HEAD:cleanup-remove-demo-and-dead-links
